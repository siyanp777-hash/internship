<!DOCTYPE html>
<html>
<head>
<title>Margin & Padding Examples</title>

<style>

body {
    background: lightgreen;
    font-family: Arial;
}

.example1 h1 {
    margin: 40px;          
    background: greenyellow;
    font-size: 40px;
}

.example1 p {
    padding: 40px;         
    background: green;
    font-size: 30px;
}

.example2 h1 {
    font-size: 40px;
    color: darkgoldenrod;
}

.container {
    background: gold;
}

.box1 {
    width: 150px;
    border: 3px solid black;
    margin: 50px;
    padding: 10px;
    background: goldenrod;
}

.box2 {
    width: 150px;
    border: 3px solid black;
    margin: 10px;
    padding: 40px;
    background: yellow;
}

.example3 h1 {
    font-size: 40px;
    color: darkblue;
}

.outer {
    background: lightskyblue;
    padding: 20px;   
}

.inner {
    background: lightblue;
    border: 3px solid black;
    margin: 40px;   
    padding: 20px;  
}

</style>
</head>

<body>

<div class="example1">
    <h1>Margin Example</h1>
    <p>Padding Example</p>
</div>

<hr>

<div class="example2">
    <h1>Margin and Padding</h1>
    <div class="container">
        <div class="box1">Big margin, small padding</div>
        <div class="box2">Small margin, big padding</div>
    </div>
</div>

<hr>

<div class="example3">
    <h1>Margin and Padding</h1>
    <div class="outer">
        Box outside has padding
        <div class="inner">
            Box inside has margin and padding
        </div>
    </div>
</div>

</body>
</html>
