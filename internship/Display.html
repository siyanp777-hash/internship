<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<style>

h1 {
    color: brown;
}

h2 {
    display: block;
    background: lightblue;
}

h3 {
    display: inline;
    background: rgb(173, 233, 173);
}

h4 {
    display: inline-block;
    width: 150px;
    background: rgb(225, 170, 170);
}

img {
    width: 200px;
    height: 200px;
    display: block;
}

</style>
</head>

<body>

<h1>Display Example</h1>

<h2>Block</h2>

<br>

<h3>Inline</h3>

<br><br>

<h4>Inline-block 1</h4>
<h4>Inline block 2</h4>

<br><br>

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="Phone">

</body>
</html>
