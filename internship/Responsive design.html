<!DOCTYPE html>
<html>
<head>
<title>Responsive Design</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.navbar {
    width: 100%;
    background: lightpink;
    color: darkred;
    padding: 15px;
    text-align: center;
    font-size: 0.7cm;
            
}


.container {
    display: flex;
}

.box {
    flex: 1;
    margin: 10px;
    background: palevioletred;
    text-align: center;
    padding: 20px;
}

@media (max-width: 600px) {
    .container {
        flex-direction: column;
    }
}

@media (min-width: 601px) and (max-width: 900px) {
    .container {
        flex-wrap: wrap;
    }

    .box {
        flex: 45%;
    }
}

</style>

</head>
<body>

<div class="navbar"><b>Responsive Design - desktop , mobile , tablet</b></div>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
