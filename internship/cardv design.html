<!DOCTYPE html>
<html>
<head>
<title>Card Design</title>

<style>
body {
    font-family: 'Times New Roman', Times, serif, sans-serif;
    background: violet;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 300px;
    padding: 20px;          
    margin: 20px;           
    border: 1px solid #080606; 
    background: lightgrey;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h2 {
    margin: 15px 0 10px;  
}

.card p {
    margin: 10px 0;
    color: indigo;
}

.card button {
    margin-top: 15px;
    padding: 10px 20px;
    background: lightgoldenrodyellow;
    color: violet;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <img src="https://m.media-amazon.com/images/I/71ZDY57yTQL._SX679_.jpg" alt="Smartphone">

    <h2>Smartphone</h2>

    <p>Powerful performance with sleek design.</p>

    <button>Buy Now</button>
</div>

</body>
</html>
