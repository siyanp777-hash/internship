<!DOCTYPE html>
<html>
<head>
<title>Position</title>

<style>

.navbar {
    position: fixed;
    top: 0px;
    width: 100%;
    background: lightblue;
    color: darkblue;
    padding: 15px;
    text-align: center;
    font-size: 1cm;
}

h2 {
    margin-top: 80px;
    padding: 20px;
    font-style: italic;
    font-size: 30px;
    color: darkcyan;
    border-bottom: solid black 1px;
}

h3 {
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    font-size: 0.8cm;
    color: purple;
}

.card {
    position: relative;
    width: 300px;
    border: 2px solid black;
    padding: 10px;
    margin: auto;
}

h4 {
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    font-size: 0.5cm;
    color: purple;
}
        
img {
    width: 200px;
}

.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: lightskyblue;
    color: darkblue;
    padding: 5px 10px;
}

h5 {
    position: static;
    background: lightblue;
    color: purple;
    padding: 10px;
    width: 150px;
    font-size: 0.5cm;
}

</style>
</head>

<body>

<div class="navbar"><b>SMARTPHONES (fixed)</b></div>

<h2>Latest smartphones</h2>

<div class="card">
    <span class="badge">Shop now (absolute)</span>
    
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="Phone">
    
    <h3>iPhone Style Phone</h3>
    
    <h4>High performance with sleek design.<br>(relative)</h4>
</div>

<h5>Flat 50% off (static)</h5>
           
</body>
</html>
