<!DOCTYPE html>
<html>
<head>
<title>Flexbox</title>

<style>
body {
    background-color: lightblue;
}

.row_container {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    height: 300px;
    background: pink;
    border: 2px solid black;
}

.box {
    width: 100px;
    height: 100px;
    background: lightskyblue;
    text-align: center;
    line-height: 100px;
    font-size: 18px;
    border: 1px solid black;
}

.column_container {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    height: 500px;
    margin-top: 20px;
    background: lightgreen;
    border: 2px solid black;
}

</style>

</head>
<body>

<h2>ROW - Products in one line</h2>

<div class="row_container">
    <div class="box">Phone</div>
    <div class="box">Laptop</div>
    <div class="box">Watch</div>
</div>

<br>

<h2>COLUMN - Items stacked</h2>

<div class="column_container">
    <div class="box">Camera</div>
    <div class="box">Tablet</div>
    <div class="box">Speaker</div>
</div>

</body>
</html>
