<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h2>Registration Form</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>
            <br><br>
            <label for="hobbies">Hobbies:</label>
            <input type="checkbox" id="listening music" name="hobbies" value="listening music">
            <label for="listening music">listening music</label>
            <input type="checkbox" id="swimming" name="hobbies" value="swimming">
            <label for="swimming">Swimming</label>
            <input type="checkbox" id="coding" name="hobbies" value="playing games">
            <label for="playing games">Playing Games</label>
            <input type="checkbox" id="watching movies" name="hobbies" value="watching movies">
            <label for="watching movies">watching movies</label>
            <br><br>
            <input type="submit" value="save">
        </form>
    </body>

</html>
